# ==========================================
# TRIGGER: Defines when the pipeline runs
# ==========================================
trigger:
- main  # Triggers the pipeline automatically on a push to the 'main' branch.

# ==========================================
# POOL: Specifies the execution machine
# ==========================================
pool:
  vmImage: 'ubuntu-latest' # Temporary clean Linux agent provided by Microsoft.

# ==========================================
# VARIABLES: Central control for configurations
# ==========================================
variables:
  # The exact name of your newly created secure Azure Service Connection.
  azureServiceConnection: 'my-fresh-azure-conn' 

# ==========================================
# STEPS: The sequential sequence of tasks
# ==========================================
steps:

# TASK 1: Install Terraform on the fresh runner agent
- task: TerraformInstaller@1
  displayName: 'Install Terraform CLI'
  inputs:
    terraformVersion: 'latest'

# TASK 2: Run native Terraform commands inside an authenticated Azure session
- task: AzureCLI@2
  displayName: 'Terraform Lifecycle (Init, Plan, Apply)'
  inputs:
    azureSubscription: '$(azureServiceConnection)' # Logs in automatically using your connection
    scriptType: 'bash'
    scriptLocation: 'inlineScript'
    inlineScript: |
      # 1. Move to the exact directory with correct capital letters as shown in image_ad91fb.png
      cd $(Build.SourcesDirectory)/04-Projects/project-03-terraform-azure-deployment/Terraform
      
      # 2. Initialize Terraform
      echo "=== STEP 1: TERRAFORM INIT ==="
      terraform init
      
      # 3. Generate the speculative preview plan
      echo "=== STEP 2: TERRAFORM PLAN ==="
      terraform plan
      
      # 4. Final deployment execution on Azure Cloud
      echo "=== STEP 3: TERRAFORM APPLY ==="
      terraform apply -auto-approve