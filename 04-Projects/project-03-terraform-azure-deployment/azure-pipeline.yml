# ==========================================
# TRIGGER: Defines when the pipeline runs
# ==========================================
trigger:
- main  # Triggers the pipeline automatically on a push to the 'main' branch.

# ==========================================
# POOL: Specifies the execution machine
# ==========================================
pool:
  vmImage: 'ubuntu-latest' # Temporary clean Linux agent provided by Microsoft.

# ==========================================
# VARIABLES: Central control for configurations
# ==========================================
variables:
  # The exact name of your secure Azure Service Connection.
  azureServiceConnection: 'my-svc-srk' 

# ==========================================
# STEPS: The sequential sequence of tasks
# ==========================================
steps:

# TASK 1: Install Terraform on the fresh runner agent
- task: TerraformInstaller@1
  displayName: 'Install Terraform CLI'
  inputs:
    terraformVersion: 'latest'

# TASK 2: Initialize the working directory (Download Azure plugins)
- task: TerraformTaskV4@4
  displayName: 'Terraform Init'
  inputs:
    provider: 'azurerm'
    command: 'init'
    workingDirectory: '$(Build.SourcesDirectory)/04-Projects/project-03-terraform-azure-deployment/terraform'

# TASK 3: Preview Changes (Dry Run)
- task: TerraformTaskV4@4
  displayName: 'Terraform Plan Preview'
  inputs:
    provider: 'azurerm'
    command: 'plan'
    workingDirectory: '$(Build.SourcesDirectory)/04-Projects/project-03-terraform-azure-deployment/terraform'
    environmentServiceNameAzureRM: '$(azureServiceConnection)' # Key to securely read cloud state

# TASK 4: Final Execution (Deploy live infrastructure to Azure)
- task: TerraformTaskV4@4
  displayName: 'Terraform Apply Provision'
  inputs:
    provider: 'azurerm'
    command: 'apply'
    workingDirectory: '$(Build.SourcesDirectory)/04-Projects/project-03-terraform-azure-deployment/terraform'
    environmentServiceNameAzureRM: '$(azureServiceConnection)' # Key to make live changes
    commandOptions: '-auto-approve' # Automatically skips human 'yes/no' typing approval