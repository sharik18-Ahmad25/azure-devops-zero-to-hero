<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sharik's Dream Deployment 🚀</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0078d4, #001829);
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin: 0;
        }
        .card {
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: center;
        }
        h1 {
            margin-bottom: 10px;
            font-size: 2.5rem;
        }
        p {
            font-size: 1.2rem;
            color: #d1ecf1;
        }
        .badge {
            background-color: #28a745;
            padding: 5px 10px;
            border-radius: 5px;
            font-weight: bold;
            display: inline-block;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>🚀 Sharik's Web App is LIVE!</h1>
        <p>This beautiful website was automatically deployed using Azure DevOps CI/CD Pipelines.</p>
        <div class="badge">Status: 100% DevOps Way ✅</div>
    </div>

</body>
</html>
